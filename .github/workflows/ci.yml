name: CI Pipeline

on:
  push:
    branches: [ main, dev, cicd-pipeline ]
  pull_request:
    branches: [ main, dev, cicd-pipeline ]

jobs:
  ###################
  #   BACKEND JOB   #
  ###################
  backend-ci:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      # 1. Code aus dem Repository auschecken
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Python-Version festlegen
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      # 3. Python-Abhängigkeiten installieren (inkl. Test-Tools)
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      # 4. Code-Stil mit Ruff prüfen (Linter)
      - name: Lint with ruff
        run: ruff check app/ tests/

      # 5. Tests mit Pytest ausführen und Coverage-Bericht erstellen
      - name: Run tests and generate coverage report
        run: pytest --cov=app --cov-report=xml

      # 6. Coverage-Bericht zu Codecov.io hochladen
      #    (Auskommentiert, bis das Token gesetzt ist)
      #- name: Upload coverage to Codecov
      #  uses: codecov/codecov-action@v4
      #  with:
      #    token: ${{ secrets.CODECOV_TOKEN }}
      #    files: ./backend/coverage.xml
      #    fail_ci_if_error: true

      # 7. Security Lab: SBOM generieren
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: ${{ runner.temp }}/backend-sbom.json

      # 8. Security Lab: SBOM scannen (Direkter Download des Binaries)
      - name: Scan SBOM (OSV Scanner)
        run: |
          curl -sL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --sbom=${{ runner.temp }}/backend-sbom.json

  ####################
  #   FRONTEND JOB   #
  ####################
  frontend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      # 1. Code auschecken
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Node.js-Version festlegen
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Frontend-Abhängigkeiten installieren
      - name: Install dependencies
        run: npm ci

      # 4. Code-Stil mit ESLint prüfen
      - name: Lint with ESLint
        run: npm run lint

      # 5. Frontend-Build ausführen
      - name: Build project
        run: npm run build

      # 6. Security Lab: SBOM generieren
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: ${{ runner.temp }}/frontend-sbom.json
          
      # 7. Security Lab: SBOM scannen (Direkter Download des Binaries)
      - name: Scan SBOM (OSV Scanner)
        run: |
          curl -sL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --sbom=${{ runner.temp }}/frontend-sbom.json